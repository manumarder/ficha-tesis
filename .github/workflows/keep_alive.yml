name: Supabase Keep Alive

on:
  schedule:
    # Se ejecuta todos los días a las 12:00 UTC (9:00 AM hora de Argentina)
    - cron: '0 12 * * *'
  workflow_dispatch: # Esto te permite activar el ping manualmente desde GitHub si querés probarlo

jobs:
  ping-db:
    runs-on: ubuntu-latest
    steps:
      - name: Chequear el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar dependencias
        run: |
          pip install psycopg2-binary

      - name: Ejecutar ping a la Base de Datos
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL || secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || '' }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY || '' }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || '' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || '' }}
          DB_USER: ${{ secrets.DB_USER || '' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD || '' }}
          DB_HOST: ${{ secrets.DB_HOST || '' }}
          DB_PORT: ${{ secrets.DB_PORT || '' }}
          DB_NAME: ${{ secrets.DB_NAME || '' }}
          DB_SSLMODE: ${{ secrets.DB_SSLMODE || 'require' }}
        run: |
          if [ -z "$DATABASE_URL" ] && [ -z "$DB_HOST" ] && [ -z "$SUPABASE_URL" ]; then
            echo "Error: No se encontró DATABASE_URL, DB_* ni SUPABASE_URL en los secrets."
            exit 1
          fi
          python -u supabase_ping.py